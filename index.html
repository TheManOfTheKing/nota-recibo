<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="PWA para geração de recibos e notas promissórias com histórico em PDF." />
    <meta name="theme-color" content="#0e0e0e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32" />
    <link rel="shortcut icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <script>
      (() => {
        const RELOAD_KEY = '__pwa_asset_reload_once__';

        const reloadWithFreshParam = (reason) => {
          try {
            if (sessionStorage.getItem(RELOAD_KEY)) {
              return;
            }
            sessionStorage.setItem(RELOAD_KEY, reason);
          } catch {
            // Ignore storage errors and continue with reload.
          }

          const url = new URL(window.location.href);
          url.searchParams.set('__fresh', String(Date.now()));
          window.location.replace(url.toString());
        };

        window.addEventListener(
          'error',
          (event) => {
            const target = event.target;
            if (target instanceof HTMLScriptElement && target.src.includes('/assets/')) {
              reloadWithFreshParam('script-load-failed');
            }
          },
          true,
        );

        window.addEventListener('unhandledrejection', (event) => {
          const message = String(
            (event.reason && event.reason.message) || event.reason || '',
          );
          if (
            message.includes('Failed to fetch dynamically imported module') ||
            message.includes('Importing a module script failed')
          ) {
            reloadWithFreshParam('chunk-load-failed');
          }
        });
      })();
    </script>
    <title>Gerador de Recibos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
